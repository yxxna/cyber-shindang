<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>사이버 신당</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:     #e8b86d;
      --gold-dim: #a07840;
      --gold-faint: rgba(232,184,109,0.15);
      --red:      #8b1a1a;
      --bg:       #09080f;
      --text:     #f0deb4;
      --smoke:    rgba(240,222,180,0.6);
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif KR', 'Apple SD Gothic Neo', serif;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      overflow-x: hidden;
    }

    /* ── 별 배경 ── */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--d, 3s) ease-in-out var(--dl, 0s) infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: var(--lo, 0.1); transform: scale(1); }
      to   { opacity: var(--hi, 0.6); transform: scale(1.4); }
    }

    /* ── 메인 레이아웃 ── */
    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 430px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ══════════════════════════════
       신당 이미지 영역
    ══════════════════════════════ */
    .shrine-wrap {
      width: 100%;
      position: relative;
      flex-shrink: 0;
    }

    /* 실제 이미지 슬롯 — src를 원하는 이미지 경로로 교체하세요 */
    .shrine-img {
      width: 100%;
      height: 52vw;
      max-height: 260px;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* 이미지가 없을 때 보이는 CSS 신당 */
    .shrine-fallback {
      width: 100%;
      height: 52vw;
      max-height: 260px;
      background: radial-gradient(ellipse 70% 80% at 50% 60%, #1e0a0a 0%, #09080f 100%);
      position: relative;
      overflow: hidden;
    }
    .shrine-img[src=""] + .shrine-fallback,
    .shrine-img:not([src]) + .shrine-fallback {
      display: block;
    }
    .shrine-img[src=""] { display: none; }

    /* 달 */
    .moon {
      position: absolute;
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #ffedd0, #c97a30);
      box-shadow:
        0 0 30px 10px rgba(220,130,50,0.35),
        0 0 80px 30px rgba(180,80,20,0.2);
      animation: moonPulse 4s ease-in-out infinite alternate;
    }
    @keyframes moonPulse {
      from { box-shadow: 0 0 30px 10px rgba(220,130,50,0.35), 0 0 80px 30px rgba(180,80,20,0.2); }
      to   { box-shadow: 0 0 50px 18px rgba(220,130,50,0.5), 0 0 120px 50px rgba(180,80,20,0.3); }
    }

    /* 신당 실루엣 */
    .shrine-silhouette {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 88%;
    }

    /* 향 연기 */
    .incense-col {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 18px;
    }
    .smoke-line {
      width: 2px;
      height: 60px;
      background: linear-gradient(to top, rgba(240,222,180,0.5), transparent);
      border-radius: 1px;
      animation: smokeWave var(--sw, 3s) ease-in-out var(--swd, 0s) infinite alternate;
      transform-origin: bottom center;
    }
    @keyframes smokeWave {
      from { transform: scaleX(1) skewX(-6deg); opacity: 0.4; }
      to   { transform: scaleX(1.4) skewX(6deg); opacity: 0.15; }
    }

    /* 이미지/fallback 하단 그라디언트 오버레이 */
    .shrine-wrap::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(to top, var(--bg), transparent);
      pointer-events: none;
    }

    /* ── 페이지 타이틀 ── */
    .header {
      padding: 20px 0 4px;
      text-align: center;
    }
    .title {
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: 8px;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(232,184,109,0.5);
    }
    .subtitle {
      margin-top: 5px;
      font-size: 0.72rem;
      font-weight: 300;
      color: var(--gold-dim);
      letter-spacing: 3px;
    }

    /* ── 구분선 ── */
    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
      margin: 14px auto;
    }

    /* ══════════════════════════════
       기도하는 손
    ══════════════════════════════ */
    .hands-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      padding: 8px 0 4px;
    }

    .hands-ring {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 1px solid rgba(232,184,109,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: border-color 0.3s;
    }
    .hands-ring::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(232,184,109,0.08);
    }

    .hands-emoji {
      font-size: 58px;
      line-height: 1;
      display: block;
      filter: drop-shadow(0 2px 8px rgba(232,184,109,0.2));
      transition: filter 0.3s;
      transform-origin: center center;
    }

    /* 비비는 모션 — skewX로 좌우 교차 상하 */
    @keyframes rubSkew {
      0%   { transform: skewX(-11deg) translateY(-4px); }
      50%  { transform: skewX( 11deg) translateY( 4px); }
      100% { transform: skewX(-11deg) translateY(-4px); }
    }
    @keyframes handGlow {
      0%   { filter: drop-shadow(0 2px 8px rgba(232,184,109,0.2)); }
      50%  { filter: drop-shadow(0 0 18px rgba(232,184,109,0.9)) drop-shadow(0 0 36px rgba(200,100,20,0.6)); }
      100% { filter: drop-shadow(0 2px 8px rgba(232,184,109,0.2)); }
    }
    @keyframes ringPulse {
      0%   { border-color: rgba(232,184,109,0.2); box-shadow: none; }
      50%  { border-color: rgba(232,184,109,0.6); box-shadow: 0 0 28px rgba(232,184,109,0.25), 0 0 60px rgba(180,80,20,0.15); }
      100% { border-color: rgba(232,184,109,0.2); box-shadow: none; }
    }

    .hands-section.praying .hands-emoji {
      animation: rubSkew 1.1s ease-in-out infinite, handGlow 1.1s ease-in-out infinite;
    }
    .hands-section.praying .hands-ring {
      animation: ringPulse 1.1s ease-in-out infinite;
    }

    .pray-status {
      margin-top: 10px;
      font-size: 0.75rem;
      color: var(--gold-dim);
      letter-spacing: 1.5px;
      min-height: 1em;
    }
    .pray-count {
      margin-top: 3px;
      font-size: 0.68rem;
      color: rgba(160,120,64,0.6);
      letter-spacing: 1px;
      min-height: 1em;
    }

    /* ── 소원 게시판 ── */
    .wishes-board {
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 0 16px;
    }
    .wishes-board-title {
      font-size: 0.68rem;
      color: var(--gold-dim);
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 10px;
    }
    .wishes-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 80px;
      max-height: 220px;
      scrollbar-width: thin;
      scrollbar-color: rgba(232,184,109,0.15) transparent;
      padding-right: 2px;
    }
    .wishes-list::-webkit-scrollbar { width: 3px; }
    .wishes-list::-webkit-scrollbar-thumb {
      background: rgba(232,184,109,0.2);
      border-radius: 2px;
    }
    .wish-item {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(232,184,109,0.04);
      border: 1px solid rgba(232,184,109,0.1);
      border-radius: 10px;
      animation: itemIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275) both;
      flex-shrink: 0;
    }
    @keyframes itemIn {
      from { opacity: 0; transform: translateY(8px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }
    .wish-item-text {
      flex: 1;
      font-size: 0.82rem;
      color: var(--text);
      line-height: 1.5;
      word-break: keep-all;
    }
    .wish-item-time {
      font-size: 0.63rem;
      color: rgba(160,120,64,0.5);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .wishes-empty {
      text-align: center;
      font-size: 0.72rem;
      color: rgba(160,120,64,0.35);
      padding: 20px 0;
      letter-spacing: 1px;
    }

    /* ── 말풍선 (fixed, 전체화면) ── */
    .wish-bubble {
      position: fixed;
      z-index: 50;
      pointer-events: none;
      background: rgba(20, 14, 8, 0.75);
      border: 1px solid rgba(232,184,109,0.3);
      border-radius: 20px 20px 20px 5px;
      padding: 10px 16px;
      color: var(--text);
      font-size: 0.85rem;
      font-family: 'Noto Serif KR', serif;
      max-width: min(72vw, 280px);
      line-height: 1.6;
      word-break: keep-all;
      white-space: pre-wrap;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(232,184,109,0.1);
      animation: wishAscend 6.5s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }

    @keyframes wishAscend {
      0%   { opacity: 0;   transform: translateY(0)     scale(0.9); }
      8%   { opacity: 1;   transform: translateY(-14px)  scale(1); }
      70%  { opacity: 1;   transform: translateY(-52vh); }
      100% { opacity: 0;   transform: translateY(-88vh)  scale(0.95); }
    }

    /* ══════════════════════════════
       입력 영역
    ══════════════════════════════ */
    .input-section {
      width: 100%;
      max-width: 430px;
      padding: 12px 16px 28px;
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(to top, #09080f 70%, transparent);
      z-index: 10;
    }

    /* 입력창 높이만큼 하단 여백 */
    .input-spacer {
      width: 100%;
      height: 80px;
      flex-shrink: 0;
    }
    .input-label {
      text-align: center;
      font-size: 0.7rem;
      color: rgba(160,120,64,0.7);
      letter-spacing: 2px;
      margin-bottom: 10px;
    }
    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(232,184,109,0.05);
      border: 1px solid rgba(232,184,109,0.18);
      border-radius: 28px;
      padding: 6px 6px 6px 18px;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .input-row:focus-within {
      border-color: rgba(232,184,109,0.4);
      box-shadow: 0 0 16px rgba(232,184,109,0.08);
    }
    .wish-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.88rem;
      font-family: inherit;
      caret-color: var(--gold);
      padding: 6px 0;
    }
    .wish-input::placeholder {
      color: rgba(160,120,64,0.45);
      font-size: 0.82rem;
    }
    .submit-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(232,184,109,0.3);
      background: linear-gradient(135deg, rgba(139,26,26,0.8), rgba(80,16,16,0.9));
      color: var(--gold);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }
    .submit-btn:hover {
      transform: scale(1.08);
      border-color: rgba(232,184,109,0.55);
      box-shadow: 0 0 12px rgba(232,184,109,0.2);
    }
    .submit-btn:active { transform: scale(0.92); }

    /* ── 토스트 ── */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-56px);
      background: rgba(14, 10, 6, 0.9);
      border: 1px solid rgba(232,184,109,0.3);
      border-radius: 16px;
      padding: 9px 20px;
      font-size: 0.78rem;
      color: var(--gold);
      letter-spacing: 1px;
      pointer-events: none;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 100;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- 별 배경 -->
<div class="stars" id="stars"></div>

<div class="page">

  <!-- 신당 이미지 영역 -->
  <!-- ✏️ src에 원하는 신당 이미지 경로를 넣어주세요 (예: src="shrine.jpg") -->
  <div class="shrine-wrap">
    <img class="shrine-img" src="" alt="신당" />

    <!-- 이미지 없을 때 보이는 CSS 신당 -->
    <div class="shrine-fallback">
      <div class="moon"></div>
      <svg class="shrine-silhouette" viewBox="0 0 340 180" xmlns="http://www.w3.org/2000/svg">
        <!-- 지면 -->
        <rect x="0" y="158" width="340" height="22" fill="#09080f"/>

        <!-- 제단 계단 -->
        <rect x="100" y="148" width="140" height="10" rx="1" fill="#1a0a08"/>
        <rect x="112" y="140" width="116" height="10" rx="1" fill="#1e0c0a"/>

        <!-- 제단 본체 -->
        <rect x="120" y="80" width="100" height="62" rx="2" fill="#15080a"/>
        <rect x="120" y="80" width="100" height="62" rx="2" fill="none" stroke="rgba(232,184,109,0.25)" stroke-width="0.8"/>

        <!-- 위패 -->
        <rect x="152" y="88" width="36" height="50" rx="3" fill="#0d0508" stroke="rgba(232,184,109,0.4)" stroke-width="0.8"/>
        <text x="170" y="120" text-anchor="middle" font-size="22" fill="rgba(232,184,109,0.85)" font-family="serif">神</text>
        <polygon points="170,82 180,88 160,88" fill="rgba(139,26,26,0.8)"/>

        <!-- 좌우 기둥 -->
        <rect x="108" y="60" width="12" height="82" rx="2" fill="#1a0808"/>
        <rect x="108" y="60" width="12" height="82" rx="2" fill="none" stroke="rgba(232,184,109,0.2)" stroke-width="0.6"/>
        <rect x="220" y="60" width="12" height="82" rx="2" fill="#1a0808"/>
        <rect x="220" y="60" width="12" height="82" rx="2" fill="none" stroke="rgba(232,184,109,0.2)" stroke-width="0.6"/>

        <!-- 지붕 -->
        <polygon points="96,62 244,62 232,38 108,38" fill="#1e0a08"/>
        <polygon points="96,62 244,62 232,38 108,38" fill="none" stroke="rgba(232,184,109,0.3)" stroke-width="0.8"/>
        <line x1="108" y1="38" x2="232" y2="38" stroke="rgba(232,184,109,0.3)" stroke-width="0.8"/>
        <!-- 지붕 마감 원 -->
        <circle cx="116" cy="62" r="4" fill="rgba(139,26,26,0.7)"/>
        <circle cx="148" cy="62" r="4" fill="rgba(139,26,26,0.7)"/>
        <circle cx="170" cy="62" r="4" fill="rgba(139,26,26,0.7)"/>
        <circle cx="192" cy="62" r="4" fill="rgba(139,26,26,0.7)"/>
        <circle cx="224" cy="62" r="4" fill="rgba(139,26,26,0.7)"/>
        <!-- 지붕 꼭대기 -->
        <polygon points="170,24 180,38 160,38" fill="rgba(139,26,26,0.9)"/>
        <circle cx="170" cy="22" r="4" fill="var(--gold)" style="filter:drop-shadow(0 0 6px #ff8800)"/>

        <!-- 등불 -->
        <line x1="114" y1="62" x2="114" y2="72" stroke="rgba(232,184,109,0.3)" stroke-width="0.8"/>
        <ellipse cx="114" cy="84" rx="7" ry="14" fill="rgba(139,26,26,0.7)"/>
        <ellipse cx="114" cy="84" rx="4" ry="9" fill="rgba(255,100,30,0.5)"/>
        <line x1="226" y1="62" x2="226" y2="72" stroke="rgba(232,184,109,0.3)" stroke-width="0.8"/>
        <ellipse cx="226" cy="84" rx="7" ry="14" fill="rgba(139,26,26,0.7)"/>
        <ellipse cx="226" cy="84" rx="4" ry="9" fill="rgba(255,100,30,0.5)"/>

        <!-- 향로 -->
        <ellipse cx="170" cy="142" rx="14" ry="4" fill="#1a0a08" stroke="rgba(232,184,109,0.2)" stroke-width="0.6"/>
        <rect x="160" y="131" width="20" height="12" rx="6" fill="#150808" stroke="rgba(232,184,109,0.2)" stroke-width="0.6"/>

        <!-- 향대 -->
        <line x1="165" y1="130" x2="162" y2="98" stroke="rgba(100,50,20,0.8)" stroke-width="1.2"/>
        <line x1="170" y1="130" x2="170" y2="96" stroke="rgba(100,50,20,0.8)" stroke-width="1.2"/>
        <line x1="175" y1="130" x2="178" y2="98" stroke="rgba(100,50,20,0.8)" stroke-width="1.2"/>
        <circle cx="162" cy="98" r="2" fill="rgba(255,100,30,0.9)"/>
        <circle cx="170" cy="96" r="2" fill="rgba(255,100,30,0.9)"/>
        <circle cx="178" cy="98" r="2" fill="rgba(255,100,30,0.9)"/>

        <!-- 촛불 -->
        <rect x="133" y="130" width="7" height="12" rx="1" fill="#d4b896"/>
        <ellipse cx="136.5" cy="128" rx="3" ry="5" fill="#ffcc44" style="filter:drop-shadow(0 0 4px #ff8800)"/>
        <rect x="200" y="130" width="7" height="12" rx="1" fill="#d4b896"/>
        <ellipse cx="203.5" cy="128" rx="3" ry="5" fill="#ffcc44" style="filter:drop-shadow(0 0 4px #ff8800)"/>
      </svg>
      <div class="incense-col">
        <div class="smoke-line" style="--sw:2.8s;--swd:0s;height:70px"></div>
        <div class="smoke-line" style="--sw:3.2s;--swd:0.5s;height:80px"></div>
        <div class="smoke-line" style="--sw:2.5s;--swd:1s;height:65px"></div>
      </div>
    </div>
  </div>

  <!-- 타이틀 -->
  <div class="header">
    <h1 class="title">사이버 신당</h1>
    <p class="subtitle">정성껏 빌면 이루어집니다</p>
  </div>

  <div class="divider"></div>

  <!-- 기도하는 손 -->
  <div class="hands-section" id="handsSection"
       role="button" aria-label="클릭하여 기도하기" tabindex="0">
    <div class="hands-ring" id="handsRing">
      <span class="hands-emoji" id="handsEmoji">🙏</span>
    </div>
    <p class="pray-status" id="prayStatus">꾹 눌러서 빌어보세요</p>
    <p class="pray-count"  id="prayCount"></p>
  </div>

  <!-- 소원 게시판 -->
  <div class="wishes-board">
    <p class="wishes-board-title">✦ 모든 이의 소원 ✦</p>
    <div class="wishes-list" id="wishesList">
      <p class="wishes-empty" id="wishesEmpty">아직 올라온 소원이 없어요</p>
    </div>
  </div>

  <div class="input-spacer"></div>

  <!-- 입력 -->
  <div class="input-section">
    <p class="input-label">간절히 바라는 것을 적어보세요</p>
    <div class="input-row">
      <input
        type="text"
        class="wish-input"
        id="wishInput"
        placeholder="소원을 적어주세요..."
        maxlength="80"
        autocomplete="off"
      />
      <button class="submit-btn" id="submitBtn" aria-label="소원 올리기">🕯</button>
    </div>
  </div>

</div>

<div class="toast" id="toast">🙏 소원이 신령님께 전해졌습니다</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, push, onValue, query, orderByChild, limitToLast, remove, get }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  /* ══════════════════════════════
     🔧 Firebase 설정 — console.firebase.google.com 에서
        프로젝트 생성 후 아래 값을 채워주세요
  ══════════════════════════════ */
  const firebaseConfig = {
    apiKey:            "AIzaSyAV8PuA4tz7gm0B6w8-xNr2Lb08_vGla-I",
    authDomain:        "cyber-sindang.firebaseapp.com",
    databaseURL:       "https://cyber-sindang-default-rtdb.firebaseio.com",
    projectId:         "cyber-sindang",
    storageBucket:     "cyber-sindang.firebasestorage.app",
    messagingSenderId: "770496510177",
    appId:             "1:770496510177:web:c07f300d7f75bc01b69fa0"
  };

  const MAX_WISHES = 100;

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const wishesRef = ref(db, 'wishes');

  /* ── 소원 게시판 렌더링 ── */
  const wishesList  = document.getElementById('wishesList');
  const wishesEmpty = document.getElementById('wishesEmpty');

  function timeStr(ts) {
    const d = new Date(ts);
    return (d.getMonth()+1) + '/' + d.getDate() + ' ' +
           String(d.getHours()).padStart(2,'0') + ':' +
           String(d.getMinutes()).padStart(2,'0');
  }

  // 실시간 리스너 — 최신 100개만 구독
  const q = query(wishesRef, orderByChild('ts'), limitToLast(MAX_WISHES));
  onValue(q, snapshot => {
    const items = [];
    snapshot.forEach(child => items.push({ key: child.key, ...child.val() }));
    items.sort((a, b) => b.ts - a.ts); // 최신순

    wishesList.innerHTML = '';
    if (items.length === 0) {
      wishesList.appendChild(wishesEmpty);
      return;
    }
    items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'wish-item';
      el.innerHTML =
        '<span class="wish-item-text">🙏 ' + esc(item.text) + '</span>' +
        '<span class="wish-item-time">'    + timeStr(item.ts) + '</span>';
      wishesList.appendChild(el);
    });
  });

  /* ── 소원 저장 + 100개 초과 시 오래된 것 삭제 ── */
  async function saveWish(text) {
    await push(wishesRef, { text, ts: Date.now() });

    // 100개 초과분 정리
    const snap = await get(query(wishesRef, orderByChild('ts')));
    const all  = [];
    snap.forEach(c => all.push({ key: c.key, ts: c.val().ts }));
    if (all.length > MAX_WISHES) {
      all.sort((a, b) => a.ts - b.ts); // 오래된 순
      const toDelete = all.slice(0, all.length - MAX_WISHES);
      await Promise.all(toDelete.map(w => remove(ref(db, 'wishes/' + w.key))));
    }
  }

  /* ── submitWish를 모듈 스코프에서 연결 ── */
  document.getElementById('submitBtn').addEventListener('click', submitWish);
  document.getElementById('wishInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); submitWish(); }
  });

  function submitWish() {
    const wishInput = document.getElementById('wishInput');
    const text = wishInput.value.trim();
    if (!text) return;

    // 떠오르는 말풍선 애니메이션
    const bubble = document.createElement('div');
    bubble.className = 'wish-bubble';
    bubble.textContent = text;
    const inputRect = wishInput.getBoundingClientRect();
    const maxLeft   = window.innerWidth - 16 * 2 - 280;
    bubble.style.top  = (inputRect.top - 16) + 'px';
    bubble.style.left = (16 + Math.random() * Math.max(0, maxLeft)) + 'px';
    document.body.appendChild(bubble);
    setTimeout(() => bubble.remove(), 6600);

    // Firebase에 저장
    saveWish(text);

    wishInput.value = '';
    showToast();
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showToast() {
    const toast = document.getElementById('toast');
    clearTimeout(window._toastTimer);
    toast.classList.add('show');
    window._toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
  }

</script>

<script>
  /* ── 별 생성 ── */
  (function() {
    const c = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const sz = 0.8 + Math.random() * 1.4;
      s.style.cssText =
        'width:' + sz + 'px;height:' + sz + 'px;' +
        'top:' + (Math.random() * 75) + '%;' +
        'left:' + (Math.random() * 100) + '%;' +
        '--d:' + (2 + Math.random() * 4) + 's;' +
        '--dl:' + (Math.random() * 5) + 's;' +
        '--lo:' + (0.05 + Math.random() * 0.15) + ';' +
        '--hi:' + (0.4 + Math.random() * 0.5) + ';';
      c.appendChild(s);
    }
  })();

  /* ── 기도 손 ── */
  const handsSection = document.getElementById('handsSection');
  const prayStatus   = document.getElementById('prayStatus');
  const prayCount    = document.getElementById('prayCount');
  let total = 0, isPraying = false, timer = null;

  function startPraying() {
    if (isPraying) return;
    isPraying = true;
    handsSection.classList.add('praying');
    prayStatus.textContent = '🔥 정성껏 빌고 있어요...';
    timer = setInterval(() => {
      total++;
      prayCount.textContent = '오늘 ' + total + '번 비볐어요';
    }, 400);
  }
  function stopPraying() {
    if (!isPraying) return;
    isPraying = false;
    handsSection.classList.remove('praying');
    prayStatus.textContent = total > 0 ? '정성이 쌓이고 있어요 🙏' : '꾹 눌러서 빌어보세요';
    clearInterval(timer);
    timer = null;
  }

  handsSection.addEventListener('mousedown', startPraying);
  handsSection.addEventListener('touchstart', e => { e.preventDefault(); startPraying(); }, { passive: false });
  document.addEventListener('mouseup', stopPraying);
  document.addEventListener('touchend', stopPraying);
  document.addEventListener('touchcancel', stopPraying);
  handsSection.addEventListener('keydown', e => { if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); startPraying(); } });
  handsSection.addEventListener('keyup',   e => { if (e.key === ' ' || e.key === 'Enter') stopPraying(); });

  // 소원 제출은 Firebase 모듈 스크립트에서 처리
</script>
</body>
</html>
