<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>🕯️ 사이버 신당</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #f5c842;
      --gold-dim: #c4925a;
      --gold-dark: #7a5020;
      --red: #c0392b;
      --red-dark: #7b1e13;
      --bg: #0a0404;
      --text: #f5d08a;
    }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 40% at 50% 0%, #2a0808 0%, transparent 70%),
        radial-gradient(ellipse 60% 30% at 50% 100%, #1a0505 0%, transparent 60%);
      color: var(--text);
      font-family: 'Noto Serif KR', 'Apple SD Gothic Neo', 'Malgun Gothic', serif;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      overflow-x: hidden;
    }

    /* ── 배경 파티클 ── */
    .bg-sparks {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .spark {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0;
      animation: floatUp var(--dur, 6s) linear var(--delay, 0s) infinite;
    }
    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) scale(0.5); }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.4; }
      100% { opacity: 0; transform: translateY(-100vh) scale(1.5); }
    }

    /* ── 메인 컨테이너 ── */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 0;
    }

    /* ── 타이틀 ── */
    .title {
      font-size: clamp(1.5rem, 6vw, 2rem);
      font-weight: 700;
      letter-spacing: 6px;
      color: var(--gold);
      text-shadow: 0 0 16px #ff8800, 0 0 40px #ff4400aa;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 0.78rem;
      color: var(--gold-dim);
      letter-spacing: 3px;
      margin-bottom: 28px;
    }

    /* ── 신당 SVG 영역 ── */
    .shrine-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 10px;
    }
    .shrine-svg {
      width: min(340px, 90vw);
      height: auto;
      filter: drop-shadow(0 0 20px #ff440044);
    }

    /* 향 연기 */
    .incense-smoke {
      animation: smokeRise 3s ease-in-out infinite alternate;
      transform-origin: bottom center;
    }
    .incense-smoke-2 {
      animation: smokeRise 2.5s ease-in-out 0.8s infinite alternate;
      transform-origin: bottom center;
    }
    @keyframes smokeRise {
      0%   { opacity: 0.15; transform: scaleX(1) translateY(0); }
      50%  { opacity: 0.5; transform: scaleX(1.3) translateY(-4px); }
      100% { opacity: 0.1; transform: scaleX(0.8) translateY(-10px); }
    }

    /* 촛불 */
    .flame-1 { animation: flicker 1.2s ease-in-out infinite alternate; transform-origin: bottom center; }
    .flame-2 { animation: flicker 1.7s ease-in-out 0.3s infinite alternate; transform-origin: bottom center; }
    @keyframes flicker {
      0%   { transform: scaleY(1) scaleX(1) rotate(-2deg); opacity: 0.9; }
      100% { transform: scaleY(1.15) scaleX(0.9) rotate(2deg); opacity: 1; }
    }

    /* 신위 글로우 */
    .tablet-glow {
      animation: tabletGlow 2s ease-in-out infinite alternate;
    }
    @keyframes tabletGlow {
      0%   { opacity: 0.3; }
      100% { opacity: 0.7; }
    }

    /* ── 기도하는 손 ── */
    .hands-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 16px 0 14px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    .hands-ring {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 1.5px solid rgba(245, 200, 66, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(255, 150, 50, 0.1);
      transition: box-shadow 0.3s;
      position: relative;
    }
    .hands-ring::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(245, 200, 66, 0.1);
    }

    /* 손 두 쪽 공통 */
    .hands-half {
      position: absolute;
      font-size: 68px;
      line-height: 1;
      filter: drop-shadow(0 0 8px rgba(255, 200, 80, 0.4));
    }
    .hand-left  { clip-path: inset(0 50% 0 0); }
    .hand-right { clip-path: inset(0 0 0 50%); }

    /* 비비는 모션 — 상하 교차 */
    @keyframes rubUp {
      0%, 100% { transform: translateY(-7px); }
      50%       { transform: translateY(7px); }
    }
    @keyframes rubDown {
      0%, 100% { transform: translateY(7px); }
      50%       { transform: translateY(-7px); }
    }
    @keyframes glowPulse {
      0%   { filter: drop-shadow(0 0 8px rgba(255,200,80,0.4)); }
      50%  { filter: drop-shadow(0 0 24px rgba(255,200,80,1)) drop-shadow(0 0 48px rgba(255,100,0,0.7)); }
      100% { filter: drop-shadow(0 0 8px rgba(255,200,80,0.4)); }
    }
    @keyframes ringGlow {
      0%   { box-shadow: 0 0 20px rgba(255,150,50,0.1); }
      50%  { box-shadow: 0 0 40px rgba(255,150,50,0.6), 0 0 80px rgba(255,80,0,0.3); }
      100% { box-shadow: 0 0 20px rgba(255,150,50,0.1); }
    }

    .hands-section.praying .hand-left {
      animation: rubUp   1.1s ease-in-out infinite, glowPulse 1.1s ease-in-out infinite;
    }
    .hands-section.praying .hand-right {
      animation: rubDown 1.1s ease-in-out infinite, glowPulse 1.1s ease-in-out infinite;
    }
    .hands-section.praying .hands-ring {
      animation: ringGlow 1.1s ease-in-out infinite;
    }

    .pray-count {
      margin-top: 10px;
      font-size: 0.78rem;
      color: var(--gold-dim);
      letter-spacing: 1px;
      min-height: 1.2em;
      transition: color 0.3s;
    }
    .pray-hint {
      font-size: 0.72rem;
      color: var(--gold-dark);
      margin-top: 3px;
      letter-spacing: 0.5px;
    }

    /* ── 소원 말풍선 영역 (공간 확보용 빈 div) ── */
    .wishes-scroll {
      width: 100%;
      flex: 1;
    }

    .wish-bubble {
      position: fixed;
      z-index: 50;
      background: rgba(245, 200, 66, 0.08);
      border: 1px solid rgba(245, 200, 66, 0.28);
      border-radius: 18px 18px 18px 4px;
      padding: 10px 15px;
      color: var(--text);
      font-size: 0.88rem;
      max-width: 78vw;
      line-height: 1.5;
      backdrop-filter: blur(4px);
      word-break: keep-all;
      white-space: pre-wrap;
      pointer-events: none;
      animation: wishFloat 6.5s ease-in-out forwards;
    }

    @keyframes wishFloat {
      0%   { opacity: 0;   transform: translateY(0)     scale(0.88); }
      8%   { opacity: 1;   transform: translateY(-16px)  scale(1); }
      72%  { opacity: 1;   transform: translateY(-55vh); }
      100% { opacity: 0;   transform: translateY(-85vh)  scale(0.92); }
    }

    /* ── 입력창 ── */
    .input-section {
      width: 100%;
      padding: 14px 0 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: sticky;
      bottom: 0;
      background: linear-gradient(to top, #0a0404 75%, transparent);
    }
    .input-label {
      font-size: 0.75rem;
      color: var(--gold-dim);
      text-align: center;
      letter-spacing: 1px;
    }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .wish-input {
      flex: 1;
      background: rgba(245, 200, 66, 0.06);
      border: 1px solid rgba(245, 200, 66, 0.25);
      border-radius: 24px;
      padding: 12px 18px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      caret-color: var(--gold);
    }
    .wish-input::placeholder { color: rgba(122, 80, 32, 0.7); }
    .wish-input:focus {
      border-color: rgba(245, 200, 66, 0.5);
      box-shadow: 0 0 12px rgba(245, 200, 66, 0.1);
    }
    .submit-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1px solid rgba(245, 200, 66, 0.35);
      background: linear-gradient(135deg, #8a4a1a, #5a2a0a);
      color: var(--gold);
      font-size: 1.15rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .submit-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 0 14px rgba(245, 200, 66, 0.35);
    }
    .submit-btn:active { transform: scale(0.93); }

    /* ── 소원 완료 토스트 ── */
    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-60px);
      background: rgba(30, 10, 5, 0.92);
      border: 1px solid rgba(245, 200, 66, 0.35);
      border-radius: 20px;
      padding: 10px 20px;
      font-size: 0.82rem;
      color: var(--gold);
      letter-spacing: 1px;
      pointer-events: none;
      transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- 배경 파티클 -->
<div class="bg-sparks" id="bgSparks"></div>

<div class="container">
  <h1 class="title">🕯 사이버 신당</h1>
  <p class="subtitle">정성껏 빌면 이루어집니다</p>

  <!-- 신당 이미지 (SVG) -->
  <div class="shrine-wrap">
    <svg class="shrine-svg" viewBox="0 0 340 260" xmlns="http://www.w3.org/2000/svg" aria-label="신당">

      <!-- 배경 후광 -->
      <radialGradient id="bgGlow" cx="50%" cy="45%" r="50%">
        <stop offset="0%"   stop-color="#ff6600" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="#0a0404" stop-opacity="0"/>
      </radialGradient>
      <rect width="340" height="260" fill="url(#bgGlow)"/>

      <!-- ── 제단 상판 ── -->
      <rect x="40" y="175" width="260" height="14" rx="3" fill="#6b1a0e"/>
      <rect x="40" y="175" width="260" height="4"  rx="2" fill="#9b2a18"/>
      <!-- 상판 테두리 금장식 -->
      <rect x="40" y="175" width="260" height="14" rx="3" fill="none" stroke="#c4925a" stroke-width="1"/>

      <!-- 제단 다리 -->
      <rect x="55"  y="189" width="18" height="55" rx="3" fill="#5a1508"/>
      <rect x="267" y="189" width="18" height="55" rx="3" fill="#5a1508"/>
      <rect x="145" y="189" width="18" height="45" rx="3" fill="#5a1508"/>
      <rect x="177" y="189" width="18" height="45" rx="3" fill="#5a1508"/>
      <!-- 다리 금장식 -->
      <rect x="55"  y="189" width="18" height="55" rx="3" fill="none" stroke="#a07040" stroke-width="0.8"/>
      <rect x="267" y="189" width="18" height="55" rx="3" fill="none" stroke="#a07040" stroke-width="0.8"/>

      <!-- 제단 하판 -->
      <rect x="48" y="234" width="244" height="10" rx="3" fill="#6b1a0e" stroke="#a07040" stroke-width="0.8"/>

      <!-- ── 신위판 (위패) ── -->
      <!-- 글로우 -->
      <class name="tablet-glow">
        <ellipse cx="170" cy="115" rx="52" ry="62" fill="#ff6600" fill-opacity="0.12" class="tablet-glow"/>
      </class>
      <!-- 위패 본체 -->
      <rect x="132" y="58" width="76" height="115" rx="6" fill="#2a0a06" stroke="#c4925a" stroke-width="1.5"/>
      <rect x="136" y="62" width="68" height="107" rx="4" fill="#1a0504" stroke="#8a5030" stroke-width="0.7"/>
      <!-- 위패 상단 마름모 -->
      <polygon points="170,48 188,62 170,68 152,62" fill="#7b1e13" stroke="#c4925a" stroke-width="1"/>
      <!-- 위패 글자 (神) -->
      <text x="170" y="125" text-anchor="middle" font-size="42" fill="#f5c842"
            font-family="serif" style="filter:drop-shadow(0 0 8px #ff8800)">神</text>
      <!-- 위패 하단 선 -->
      <line x1="142" y1="138" x2="198" y2="138" stroke="#8a5030" stroke-width="0.8"/>
      <text x="170" y="155" text-anchor="middle" font-size="9" fill="#c4925a"
            font-family="serif" letter-spacing="2">소원성취</text>

      <!-- ── 붉은 기둥 ── -->
      <!-- 왼쪽 -->
      <rect x="30" y="55" width="22" height="120" rx="4" fill="#8b1a0e"/>
      <rect x="30" y="55" width="22" height="120" rx="4" fill="none" stroke="#c4925a" stroke-width="1"/>
      <rect x="34" y="60" width="14" height="3" rx="1" fill="#c4925a" fill-opacity="0.5"/>
      <!-- 오른쪽 -->
      <rect x="288" y="55" width="22" height="120" rx="4" fill="#8b1a0e"/>
      <rect x="288" y="55" width="22" height="120" rx="4" fill="none" stroke="#c4925a" stroke-width="1"/>
      <rect x="292" y="60" width="14" height="3" rx="1" fill="#c4925a" fill-opacity="0.5"/>

      <!-- ── 처마 지붕 ── -->
      <!-- 지붕 그림자 -->
      <polygon points="15,58 325,58 305,32 35,32" fill="#400e0a" opacity="0.7"/>
      <!-- 지붕 본체 -->
      <polygon points="10,60 330,60 308,34 32,34" fill="#8b1a0e"/>
      <!-- 지붕 테두리 -->
      <polygon points="10,60 330,60 308,34 32,34" fill="none" stroke="#c4925a" stroke-width="1.2"/>
      <!-- 처마 하단 장식선 -->
      <line x1="10" y1="60" x2="330" y2="60" stroke="#c4925a" stroke-width="1.5"/>
      <!-- 지붕 능선 -->
      <line x1="32" y1="34" x2="308" y2="34" stroke="#c4925a" stroke-width="1"/>
      <!-- 지붕 중앙 장식 -->
      <polygon points="170,18 180,34 160,34" fill="#c4925a"/>
      <circle cx="170" cy="16" r="5" fill="#f5c842" style="filter:drop-shadow(0 0 6px #ff8800)"/>

      <!-- 처마 장식 원 -->
      <circle cx="52"  cy="60" r="5" fill="#c4925a"/>
      <circle cx="96"  cy="60" r="5" fill="#c4925a"/>
      <circle cx="140" cy="60" r="5" fill="#c4925a"/>
      <circle cx="184" cy="60" r="5" fill="#c4925a"/>
      <circle cx="228" cy="60" r="5" fill="#c4925a"/>
      <circle cx="272" cy="60" r="5" fill="#c4925a"/>
      <circle cx="316" cy="60" r="5" fill="#c4925a"/>

      <!-- ── 등불 ── -->
      <!-- 왼쪽 등불 -->
      <line x1="62" y1="60" x2="62" y2="75" stroke="#c4925a" stroke-width="1"/>
      <ellipse cx="62" cy="100" rx="14" ry="26" fill="#7b1e13" stroke="#c4925a" stroke-width="1"/>
      <ellipse cx="62" cy="100" rx="9"  ry="20" fill="#ff6600" fill-opacity="0.6"/>
      <line x1="62" y1="126" x2="62" y2="135" stroke="#c4925a" stroke-width="1"/>
      <ellipse cx="62" cy="136" rx="6" ry="3" fill="#c4925a"/>
      <!-- 오른쪽 등불 -->
      <line x1="278" y1="60" x2="278" y2="75" stroke="#c4925a" stroke-width="1"/>
      <ellipse cx="278" cy="100" rx="14" ry="26" fill="#7b1e13" stroke="#c4925a" stroke-width="1"/>
      <ellipse cx="278" cy="100" rx="9"  ry="20" fill="#ff6600" fill-opacity="0.6"/>
      <line x1="278" y1="126" x2="278" y2="135" stroke="#c4925a" stroke-width="1"/>
      <ellipse cx="278" cy="136" rx="6" ry="3" fill="#c4925a"/>

      <!-- ── 향로 ── -->
      <ellipse cx="170" cy="185" rx="22" ry="6" fill="#4a1008" stroke="#c4925a" stroke-width="0.8"/>

      <!-- 향로 다리 -->
      <line x1="155" y1="185" x2="150" y2="195" stroke="#c4925a" stroke-width="1.5"/>
      <line x1="170" y1="185" x2="170" y2="195" stroke="#c4925a" stroke-width="1.5"/>
      <line x1="185" y1="185" x2="190" y2="195" stroke="#c4925a" stroke-width="1.5"/>

      <!-- 향 막대기 3개 -->
      <line x1="163" y1="168" x2="159" y2="120" stroke="#6a3018" stroke-width="1.5"/>
      <line x1="170" y1="168" x2="170" y2="116" stroke="#6a3018" stroke-width="1.5"/>
      <line x1="177" y1="168" x2="181" y2="120" stroke="#6a3018" stroke-width="1.5"/>
      <!-- 향 불씨 -->
      <circle cx="159" cy="120" r="2.5" fill="#ff6600" opacity="0.9" style="filter:drop-shadow(0 0 4px #ff4400)"/>
      <circle cx="170" cy="116" r="2.5" fill="#ff6600" opacity="0.9" style="filter:drop-shadow(0 0 4px #ff4400)"/>
      <circle cx="181" cy="120" r="2.5" fill="#ff6600" opacity="0.9" style="filter:drop-shadow(0 0 4px #ff4400)"/>

      <!-- 연기 (향) -->
      <path class="incense-smoke" d="M159,118 Q155,108 159,98 Q163,88 159,78" stroke="#aaa" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.3"/>
      <path class="incense-smoke-2" d="M170,114 Q174,104 170,94 Q166,84 170,74" stroke="#aaa" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.3"/>
      <path class="incense-smoke" d="M181,118 Q177,108 181,98 Q185,88 181,78" stroke="#aaa" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.25"/>

      <!-- ── 촛불 ── -->

      <ellipse cx="107" cy="150" rx="2" ry="4" fill="#fff" class="flame-1"/>

      <!-- 오른쪽 촛불 -->
      <rect x="228" y="157" width="10" height="18" rx="2" fill="#eeddb0"/>

      <!-- 오른쪽 불꽃 -->
      <ellipse cx="233" cy="150" rx="4" ry="7" fill="#ffdd00" class="flame-2" style="filter:drop-shadow(0 0 6px #ff8800)"/>

      <ellipse cx="145" cy="173" rx="9"  ry="7" fill="#e67e22"/>
      <ellipse cx="215" cy="174" rx="10" ry="7" fill="#27ae60"/>
      <ellipse cx="195" cy="173" rx="9"  ry="7" fill="#f39c12"/>

    </svg>
  </div>

  <!-- 기도하는 손 -->
  <div class="hands-section" id="handsSection" role="button" aria-label="클릭하여 기도하기" tabindex="0">
    <div class="hands-ring" id="handsRing">
      <span class="hands-half hand-left">🙏</span>
      <span class="hands-half hand-right">🙏</span>
    </div>
    <div class="pray-count" id="prayCount">꾹 눌러서 빌어보세요</div>
    <div class="pray-hint" id="prayHint">오늘 0번 비볐어요</div>
  </div>

  <!-- 소원 말풍선 영역 -->
  <div class="wishes-scroll" id="wishesScroll">
    <p class="empty-hint" id="emptyHint">✨ 소원을 적으면 신령님께 전해집니다 ✨</p>
  </div>

  <!-- 입력창 -->
  <div class="input-section">
    <div class="input-label">📿 간절히 바라는 것을 적어보세요</div>
    <div class="input-row">
      <input
        type="text"
        class="wish-input"
        id="wishInput"
        placeholder="소원을 적어주세요..."
        maxlength="80"
        autocomplete="off"
      />
      <button class="submit-btn" id="submitBtn" aria-label="소원 올리기">🕯</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast">🙏 소원이 신령님께 전해졌습니다</div>

<script>
  /* ── 배경 파티클 생성 ── */
  (function() {
    const container = document.getElementById('bgSparks');
    for (let i = 0; i < 28; i++) {
      const s = document.createElement('div');
      s.className = 'spark';
      s.style.left = Math.random() * 100 + '%';
      s.style.bottom = '-4px';
      s.style.setProperty('--dur',   (4 + Math.random() * 6) + 's');
      s.style.setProperty('--delay', (Math.random() * 8) + 's');
      s.style.opacity = '0';
      container.appendChild(s);
    }
  })();

  /* ── 기도 손 ── */
  const handsSection = document.getElementById('handsSection');
  const prayCountEl  = document.getElementById('prayCount');
  const prayHintEl   = document.getElementById('prayHint');

  let prayTotal = 0;
  let prayTimer = null;
  let isPraying  = false;

  function startPraying() {
    if (isPraying) return;
    isPraying = true;
    handsSection.classList.add('praying');
    prayCountEl.textContent = '🔥 정성껏 빌고 있어요...';
    prayTimer = setInterval(() => {
      prayTotal++;
      prayHintEl.textContent = '오늘 ' + prayTotal + '번 비볐어요';
    }, 400);
  }

  function stopPraying() {
    if (!isPraying) return;
    isPraying = false;
    handsSection.classList.remove('praying');
    prayCountEl.textContent = prayTotal > 0 ? '정성이 쌓이고 있어요 🙏' : '꾹 눌러서 빌어보세요';
    clearInterval(prayTimer);
    prayTimer = null;
  }

  handsSection.addEventListener('mousedown',  startPraying);
  handsSection.addEventListener('touchstart', e => { e.preventDefault(); startPraying(); }, { passive: false });
  document.addEventListener('mouseup',  stopPraying);
  document.addEventListener('touchend', stopPraying);
  document.addEventListener('touchcancel', stopPraying);
  handsSection.addEventListener('keydown', e => { if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); startPraying(); } });
  handsSection.addEventListener('keyup',   e => { if (e.key === ' ' || e.key === 'Enter') stopPraying(); });

  /* ── 소원 올리기 ── */
  const wishInput   = document.getElementById('wishInput');
  const submitBtn   = document.getElementById('submitBtn');
  const wishesScroll = document.getElementById('wishesScroll');
  const emptyHint   = document.getElementById('emptyHint');
  const toast       = document.getElementById('toast');
  let toastTimer    = null;

  function getTimeStr() {
    const d = new Date();
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    return hh + ':' + mm;
  }

  function showToast() {
    clearTimeout(toastTimer);
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
  }

  function submitWish() {
    const text = wishInput.value.trim();
    if (!text) return;

    const bubble = document.createElement('div');
    bubble.className = 'wish-bubble';
    bubble.textContent = '🙏 ' + text;

    // 입력창 바로 위에서 시작, 가로는 살짝 랜덤
    const inputRect = wishInput.getBoundingClientRect();
    const maxLeft = Math.max(8, window.innerWidth * 0.78);
    bubble.style.top  = (inputRect.top - 20) + 'px';
    bubble.style.left = (8 + Math.random() * (window.innerWidth - maxLeft - 24)) + 'px';

    document.body.appendChild(bubble);

    // 6.5s 뒤 DOM에서 제거
    setTimeout(() => bubble.remove(), 6500);

    wishInput.value = '';
    showToast();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  submitBtn.addEventListener('click', submitWish);
  wishInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); submitWish(); }
  });
</script>
</body>
</html>
